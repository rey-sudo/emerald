services:
  pg-document:
    image: postgres:17-alpine
    container_name: pg-document
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=api_document
    ports:
      - "5432:5432"
    volumes:
      - pg_data_document:/var/lib/postgresql/data

volumes:
  pg_data_document:
    driver: local
