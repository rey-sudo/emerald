services:
  redis-global:
    image: redis:7.2-alpine
    container_name: redis_global
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 512mb 
      --maxmemory-policy noeviction
    restart: always
    networks:
      - shared-network

volumes:
  redis_data:

networks:
  shared-network:
    external: true
    name: global-infra-net