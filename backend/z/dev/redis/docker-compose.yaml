services:
  bullmq-redis:
    image: redis:7.2-alpine
    container_name: bullmq_redis
    network_mode: host
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 512mb 
      --maxmemory-policy noeviction
    restart: always

volumes:
  redis_data:
