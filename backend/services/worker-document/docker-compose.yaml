services:
  js-sidecar:
    build:
      context: ./js-sidecar
      dockerfile: Dockerfile
    expose:
      - "3000"        # No expone al host, solo a la red interna
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      SIDECAR_URL: http://js-sidecar:3000   # En K8s esto es localhost
    depends_on:
      redis:
        condition: service_healthy
      js-sidecar:
        condition: service_healthy
    volumes:
      - ./worker/src:/app/src   # Hot reload en desarrollo
